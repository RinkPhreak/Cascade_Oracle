services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c max_connections=100
      -c effective_cache_size=1536MB
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    command: redis-server --save 60 1 --loglevel warning
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build: .
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      # Memory thresholds for internal MemoryMonitor
      MEMORY_WARN_THRESHOLD: "0.80"
      MEMORY_CRITICAL_THRESHOLD: "0.90"
      MEMORY_LIMIT_BYTES_FALLBACK: "3221225472"
    deploy:
      resources:
        limits:
          # Exactly 3G. Cgroup v2 /sys/fs/cgroup/memory.max will show this value in bytes.
          memory: 3G 

  # UI for Asynq queues
  asynqmon:
    image: hibiken/asynqmon:latest
    restart: always
    ports:
      - "8080:8080"
    command: --redis-url=redis://${REDIS_ADDR}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 128M

  # Backup Sidecar (Cron trigger pattern)
  backup:
    image: postgres:16-alpine
    restart: on-failure
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - backup_vol:/backups
    # Script executes dump, compresses, and deletes archives older than 7 days
    entrypoint: >
      sh -c "pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB 
      | gzip > /backups/cascade_$$(date +%Y%m%d_%H%M%S).sql.gz 
      && find /backups -name '*.sql.gz' -mtime +7 -delete"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  redisdata:
  backup_vol:
