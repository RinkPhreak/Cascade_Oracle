definitions:
  dto.AccountResponse:
    properties:
      channel:
        type: string
      created_at:
        type: string
      daily_check_count:
        type: integer
      daily_send_count:
        type: integer
      id:
        type: string
      phone:
        type: string
      proxy_id:
        type: string
      status:
        type: string
    type: object
  dto.AnonymiseResponse:
    properties:
      contact_id:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  dto.AuthLoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  dto.AuthTokenResponse:
    properties:
      access_token:
        type: string
    type: object
  dto.BreakGlassRequest:
    properties:
      password:
        type: string
      reason:
        type: string
    required:
    - password
    type: object
  dto.CampaignResponse:
    description: Summary view of a created or fetched campaign.
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      scheduled_at:
        type: string
      status:
        type: string
    type: object
  dto.CampaignStatsResponse:
    properties:
      completed:
        type: integer
      error_breakdown:
        additionalProperties:
          type: integer
        type: object
      failed:
        type: integer
      replied:
        type: integer
      sms_attempted:
        type: integer
      tg_attempted:
        type: integer
      total:
        type: integer
    type: object
  dto.CampaignTaskResponse:
    properties:
      attempt_number:
        type: integer
      channel:
        type: string
      contact_id:
        type: string
      id:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  dto.ContactTraceResponse:
    properties:
      attempt:
        type: integer
      channel:
        type: string
      error_code:
        type: string
      error_message:
        type: string
      id:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  dto.CreateCampaignRequest:
    description: Payload containing name, optional schedule, and mandatory templates
      for telegram/sms channels.
    properties:
      name:
        type: string
      scheduled_at:
        type: string
      templates:
        additionalProperties:
          type: string
        description: <--- Убрали validate:"required"
        type: object
    required:
    - name
    type: object
  dto.CreateProxyRequest:
    properties:
      host:
        type: string
      id:
        type: string
      password:
        type: string
      port:
        type: integer
      username:
        type: string
    required:
    - host
    - port
    type: object
  dto.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  dto.LeadResponse:
    properties:
      channel:
        type: string
      id:
        type: string
      message:
        type: string
      name:
        type: string
      phone:
        type: string
      replied_at:
        type: string
    type: object
  dto.ProxyResponse:
    properties:
      created_at:
        type: string
      host:
        type: string
      id:
        type: string
      port:
        type: integer
      status:
        type: string
      username:
        type: string
    type: object
  dto.RegisterAccountRequest:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  dto.SystemMetricsResponse:
    properties:
      active_tg_accounts:
        type: integer
      cascade_memory_usage_ratio:
        type: number
      queue_depth:
        type: integer
      system_status:
        description: '''OPERATIONAL'', ''DEGRADED'', ''HALTED'''
        type: string
      total_tg_accounts:
        type: integer
    type: object
info:
  contact: {}
paths:
  /api/v1/accounts:
    get:
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.AccountResponse'
            type: array
      security:
      - Bearer: []
      summary: List all Telegram accounts
      tags:
      - accounts
  /api/v1/accounts/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Phone
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AccountResponse'
      security:
      - Bearer: []
      summary: Register a new TG account
      tags:
      - accounts
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthTokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Operator Login
      tags:
      - auth
  /api/v1/campaigns:
    get:
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CampaignResponse'
            type: array
      security:
      - Bearer: []
      summary: List all campaigns
      tags:
      - campaigns
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCampaignRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CampaignResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create a new campaign
      tags:
      - campaigns
  /api/v1/campaigns/{id}/import:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Campaign UUID
        in: path
        name: id
        required: true
        type: string
      - description: CSV File
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Import contacts via CSV
      tags:
      - campaigns
  /api/v1/campaigns/{id}/pause:
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign UUID
        in: path
        name: id
        required: true
        type: string
      - description: Re-auth required
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BreakGlassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Campaign Paused
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: Emergency Campaign Pause
      tags:
      - campaigns
  /api/v1/campaigns/{id}/start:
    post:
      parameters:
      - description: Campaign UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "202":
          description: Accepted for processing
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Enqueue campaign for processing
      tags:
      - campaigns
  /api/v1/campaigns/{id}/stats:
    get:
      parameters:
      - description: Campaign UUID
        in: path
        name: id
        required: true
        type: string
      - description: Filter from (ISO8601)
        in: query
        name: start_time
        type: string
      - description: Filter to (ISO8601)
        in: query
        name: end_time
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CampaignStatsResponse'
      security:
      - Bearer: []
      summary: Fetch campaign statistics
      tags:
      - campaigns
  /api/v1/campaigns/{id}/tasks:
    get:
      parameters:
      - description: Campaign UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CampaignTaskResponse'
            type: array
      security:
      - Bearer: []
      summary: List in-progress delivery tasks
      tags:
      - campaigns
  /api/v1/contacts:
    get:
      parameters:
      - description: Filter only those who replied
        in: query
        name: has_replied
        type: boolean
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.LeadResponse'
            type: array
      security:
      - Bearer: []
      summary: List contacts (leads)
      tags:
      - contacts
  /api/v1/contacts/{id}/anonymise:
    post:
      parameters:
      - description: Contact UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AnonymiseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: Right to be Forgotten (152-FZ / GDPR)
      tags:
      - contacts
  /api/v1/contacts/{id}/trace:
    get:
      parameters:
      - description: Contact UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ContactTraceResponse'
            type: array
      security:
      - Bearer: []
      summary: Fetch delivery trace for a contact
      tags:
      - contacts
  /api/v1/proxies:
    get:
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProxyResponse'
            type: array
      security:
      - Bearer: []
      summary: List all network proxies
      tags:
      - proxies
    post:
      consumes:
      - application/json
      parameters:
      - description: Proxy Address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProxyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProxyResponse'
      security:
      - Bearer: []
      summary: Add a new proxy
      tags:
      - proxies
  /api/v1/system/halt:
    post:
      consumes:
      - application/json
      parameters:
      - description: Reason and Re-auth
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BreakGlassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: System Halted
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: Emergency Break-Glass Halt
      tags:
      - system
  /api/v1/system/metrics:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SystemMetricsResponse'
      security:
      - Bearer: []
      summary: Fetch system health and halt state
      tags:
      - system
  /api/v1/system/resume:
    post:
      consumes:
      - application/json
      parameters:
      - description: Re-auth required
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BreakGlassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: System Resumed
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: Emergency Break-Glass Resume
      tags:
      - system
swagger: "2.0"
